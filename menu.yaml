# 优化后的前端菜单配置文件
# 增加了 path, icon, component 字段以符合常见的前端框架使用规范
menu:
  - name: "系统设置"
    id: "system_settings"
    path: "/system-settings"
    icon: "IconSystemSettings"
    component: "Layout"
    children:
      - name: "组织管理"
        id: "organization_management"
        path: "organization-management"
        icon: "IconOrganizationManagement"
        component: "views/system-settings/OrganizationManagement"
        api_paths:
          - "/api/v1/identity/organizations"
          - "/api/v1/identity/organizations/*"
          - "/api/v1/identity/departments"
          - "/api/v1/identity/departments/*"
          - "/api/v1/identity/organization-logos"
          - "/api/v1/identity/organization-logos/*"
          - "/api/v1/identity/users/*/memberships"
          - "/api/v1/identity/users/*/primary-membership"

      - name: "角色权限"
        id: "role_permissions"
        path: "role-permissions"
        icon: "IconRolePermissions"
        component: "views/system-settings/RolePermissions"
        api_paths:
          - "/api/v1/permission/roles"
          - "/api/v1/permission/roles/*"

      - name: "账号管理"
        id: "account_management"
        path: "account-management"
        icon: "IconAccountManagement"
        component: "views/system-settings/AccountManagement"
        api_paths:
          - "/api/v1/identity/users"
          - "/api/v1/identity/users/*"

      - name: "审计日志"
        id: "audit_logs"
        path: "audit-logs"
        icon: "IconAuditLogs"
        component: "views/system-settings/AuditLogs"
        api_paths:
          - "/api/v1/identity/audit-logs"
          - "/api/v1/identity/audit-logs/*"

      - name: "OAuth2 应用管理"
        id: "oauth2_management"
        path: "oauth2"
        icon: "IconOAuth2"
        component: "views/system-settings/OAuth2Management"