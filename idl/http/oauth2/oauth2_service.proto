syntax = "proto3";

package oauth2;

option go_package = "github.com/masonsxu/cloudwego-microservice-demo/gateway/biz/model/oauth2";

import "base/api.proto";
import "google/protobuf/empty.proto";
import "http/base/base.proto";
import "http/oauth2/oauth2_model.proto";

service OAuth2ManagementService {
  rpc CreateOAuth2Client(CreateOAuth2ClientRequestDTO) returns (CreateOAuth2ClientResponseDTO) {
    option (api.post) = "/api/v1/oauth2/clients";
  }

  rpc GetOAuth2Client(GetOAuth2ClientRequestDTO) returns (OAuth2ClientResponseDTO) {
    option (api.get) = "/api/v1/oauth2/clients/:id";
  }

  rpc UpdateOAuth2Client(UpdateOAuth2ClientRequestDTO) returns (OAuth2ClientResponseDTO) {
    option (api.put) = "/api/v1/oauth2/clients/:id";
  }

  rpc DeleteOAuth2Client(DeleteOAuth2ClientRequestDTO) returns (http_base.OperationStatusResponseDTO) {
    option (api.delete) = "/api/v1/oauth2/clients/:id";
  }

  rpc ListOAuth2Clients(ListOAuth2ClientsRequestDTO) returns (ListOAuth2ClientsResponseDTO) {
    option (api.get) = "/api/v1/oauth2/clients";
  }

  rpc RotateOAuth2ClientSecret(RotateOAuth2ClientSecretRequestDTO) returns (RotateOAuth2ClientSecretResponseDTO) {
    option (api.post) = "/api/v1/oauth2/clients/:id/rotate-secret";
  }

  rpc ListOAuth2Scopes(ListOAuth2ScopesRequestDTO) returns (ListOAuth2ScopesResponseDTO) {
    option (api.get) = "/api/v1/oauth2/scopes";
  }

  rpc GetOAuth2Config(google.protobuf.Empty) returns (GetOAuth2ConfigResponseDTO) {
    option (api.get) = "/api/v1/oauth2/config";
  }

  rpc ListMyOAuth2Consents(ListMyOAuth2ConsentsRequestDTO) returns (ListOAuth2ConsentsResponseDTO) {
    option (api.get) = "/api/v1/oauth2/consents";
  }

  rpc RevokeMyOAuth2Consent(RevokeMyOAuth2ConsentRequestDTO) returns (http_base.OperationStatusResponseDTO) {
    option (api.delete) = "/api/v1/oauth2/consents/:clientID";
  }
}
