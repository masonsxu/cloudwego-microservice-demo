  optional string employeeID = 7 [(api.body) = "employee_id", (api.vd) = "@:len($)<=50; msg:'员工工号长度不能超过50个字符'"];
  optional int64 accountExpiry = 8 [(api.body) = "account_expiry"];
  optional int32 gender = 9 [(api.body) = "gender", (api.vd) = "@:$ == null || ($ >= 0 && $ <= 2); msg:'性别值必须为null或在0-2之间'"];
}

message DeleteUserRequestDTO {
  optional string userID = 1 [(api.path) = "userID", (api.vd) = "@:len($)==36; msg:'用户ID格式不正确'", (api.none) = "true"];
  optional string reason = 2 [(api.body) = "reason", (api.vd) = "@:len($)<=200; msg:'删除原因不能超过200个字符'"];
}

message ListUsersRequestDTO {
  optional http_base.PageRequestDTO page = 1 [(api.none) = "true"];
  optional string organizationID = 2 [(api.query) = "organization_id"];
