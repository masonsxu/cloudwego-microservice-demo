  optional string email = 2 [(api.body) = "email", (api.vd) = "@:len($)==0 || email($); msg:'邮箱格式不正确'"];
  optional string phone = 3 [(api.body) = "phone", (api.vd) = "@:len($)==0 || phone($); msg:'手机号格式不正确'"];
  optional string firstName = 4 [(api.body) = "first_name", (api.vd) = "@:len($)<=50; msg:'名字长度不能超过50个字符'"];
  optional string lastName = 5 [(api.body) = "last_name", (api.vd) = "@:len($)<=50; msg:'姓氏长度不能超过50个字符'"];
  optional string realName = 6 [(api.body) = "real_name", (api.vd) = "@:len($)<=100; msg:'真实姓名长度不能超过100个字符'"];
  optional string professionalTitle = 7 [(api.body) = "professional_title", (api.vd) = "@:len($)<=100; msg:'职业头衔长度不能超过100个字符'"];
  optional string employeeID = 8 [(api.body) = "employee_id", (api.vd) = "@:len($)<=50; msg:'员工工号长度不能超过50个字符'"];
  optional int64 accountExpiry = 9 [(api.body) = "account_expiry"];
  optional int32 gender = 10 [(api.body) = "gender", (api.vd) = "@:$ == null || ($ >= 0 && $ <= 2); msg:'性别值必须为null或在0-2之间'"];
  optional google.protobuf.ListValue roleIDs = 11 [(api.body) = "role_ids"];
  optional string organizationID = 12 [(api.body) = "organization_id", (api.vd) = "@:len($)==0 || len($)==36; msg:'组织ID格式不正确'"];
}

message UpdateMeRequestDTO {
  optional string email = 1 [(api.body) = "email", (api.vd) = "@:len($)==0 || email($); msg:'邮箱格式不正确'"];
  optional string phone = 2 [(api.body) = "phone", (api.vd) = "@:len($)==0 || phone($); msg:'手机号格式不正确'"];
  optional string firstName = 3 [(api.body) = "first_name", (api.vd) = "@:len($)<=50; msg:'名字长度不能超过50个字符'"];
  optional string lastName = 4 [(api.body) = "last_name", (api.vd) = "@:len($)<=50; msg:'姓氏长度不能超过50个字符'"];
