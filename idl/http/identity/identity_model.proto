syntax = "proto3";

package identity;

option go_package = "github.com/masonsxu/cloudwego-microservice-demo/gateway/biz/model/identity";

import "base/api.proto";
import "google/protobuf/struct.proto";
import "http/base/base.proto";
import "http/permission/permission_model.proto";

message LoginRequestDTO {
  optional string username = 1 [(api.body) = "username", (api.vd) = "@:len($) > 0; msg:'用户名不能为空'"];
  optional string password = 2 [(api.body) = "password", (api.vd) = "@:len($) > 0; msg:'密码不能为空'"];
}

message RoleInfoDTO {
  optional string id = 1;
  optional string code = 2;
  optional string name = 3;
  optional int32 dataScope = 4;
}

message LoginResponseDTO {
  optional http_base.BaseResponseDTO baseResp = 1;
  optional UserProfileDTO userProfile = 2;
  repeated permission.MenuNodeDTO menuTree = 3;
  optional http_base.TokenInfoDTO tokenInfo = 4;
  repeated UserMembershipDTO memberships = 5;
  repeated string roleIDs = 6;
  repeated permission.MenuPermissionDTO permissions = 7;
  repeated RoleInfoDTO roles = 8;
}

message LogoutRequestDTO {
  optional string refreshToken = 1 [(api.body) = "refresh_token", (api.vd) = "@:len($) > 0; msg:'刷新令牌不能为空'"];
}

message ChangePasswordRequestDTO {
  optional string oldPassword = 1 [(api.body) = "old_password", (api.vd) = "@:len($)>0; msg:'当前密码不能为空'"];
  optional string newPassword = 2 [(api.body) = "new_password", (api.vd) = "@:len($)>0 && len($)>=6; msg:'新密码不能为空且长度至少为6位'"];
}

message ResetPasswordRequestDTO {
  optional string userID = 1 [(api.body) = "user_id", (api.vd) = "@:len($)==36; msg:'用户ID格式不正确'"];
  optional string newPassword = 2 [(api.body) = "new_password", (api.vd) = "@:len($)==0 || len($)>=6; msg:'新密码长度至少为6位'"];
  optional string resetReason = 3 [(api.body) = "reset_reason", (api.vd) = "@:len($)<=200; msg:'重置原因不能超过200个字符'"];
}

message ForcePasswordChangeRequestDTO {
  optional string userID = 1 [(api.body) = "user_id", (api.vd) = "@:len($)==36; msg:'用户ID格式不正确'"];
  optional string reason = 2 [(api.body) = "reason", (api.vd) = "@:len($)<=200; msg:'原因不能超过200个字符'"];
}

message RefreshTokenRequestDTO {
  optional string refreshToken = 1 [(api.body) = "refresh_token", (api.vd) = "@:len($)>0; msg:'刷新令牌不能为空'"];
}

message RefreshTokenResponseDTO {
  optional http_base.BaseResponseDTO baseResp = 1;
  optional http_base.TokenInfoDTO tokenInfo = 2;
}

message UserProfileDTO {
  optional string id = 1;
  optional string username = 2;
  optional string email = 3;
  optional string phone = 4;
  optional string firstName = 5;
  optional string lastName = 6;
  optional string realName = 7;
  optional string professionalTitle = 8;
  optional string employeeID = 9;
  optional int32 status = 10;
  optional bool mustChangePassword = 11;
  optional int64 accountExpiry = 12;
  optional int32 gender = 13;
  optional int64 createdAt = 14;
  optional int64 updatedAt = 15;
  optional int64 lastLoginTime = 16;
  optional int32 loginAttempts = 17;
  optional string createdBy = 18;
  optional string updatedBy = 19;
  repeated string roleIDs = 20;
  optional string primaryOrganizationID = 21;
  optional string primaryDepartmentID = 22;
}

message UserProfileResponseDTO {
  optional http_base.BaseResponseDTO baseResp = 1;
  optional UserProfileDTO user = 2;
}

message CreateUserRequestDTO {
  optional string username = 1 [(api.body) = "username", (api.vd) = "@:len($)>0 && len($)>=3 && len($)<=20 && regexp('^[a-zA-Z0-9_-]+$',$); msg:'用户名必须是3-20位字母、数字、下划线或短横线'"];
  optional string password = 2 [(api.body) = "password", (api.vd) = "@:len($)>0 && len($)>=6; msg:'密码不能为空且长度至少为6位'"];
  optional string email = 3 [(api.body) = "email", (api.vd) = "@:len($)==0 || email($); msg:'邮箱格式不正确'"];
  optional string phone = 4 [(api.body) = "phone", (api.vd) = "@:len($)==0 || phone($); msg:'手机号格式不正确'"];
  optional string firstName = 5 [(api.body) = "first_name", (api.vd) = "@:len($)<=50; msg:'名字长度不能超过50个字符'"];
  optional string lastName = 6 [(api.body) = "last_name", (api.vd) = "@:len($)<=50; msg:'姓氏长度不能超过50个字符'"];
  optional string realName = 7 [(api.body) = "real_name", (api.vd) = "@:len($)<=100; msg:'真实姓名长度不能超过100个字符'"];
  optional string professionalTitle = 8 [(api.body) = "professional_title", (api.vd) = "@:len($)<=100; msg:'职业头衔长度不能超过100个字符'"];
  optional string employeeID = 9 [(api.body) = "employee_id", (api.vd) = "@:len($)<=50; msg:'员工工号长度不能超过50个字符'"];
  optional bool mustChangePassword = 10 [(api.body) = "must_change_password"];
  optional int64 accountExpiry = 11 [(api.body) = "account_expiry"];
  optional int32 gender = 12 [(api.body) = "gender", (api.vd) = "@:$ == null || ($ >= 0 && $ <= 2); msg:'性别值必须为null或在0-2之间'"];
  repeated string roleIDs = 13 [(api.body) = "role_ids"];
  optional string organizationID = 14 [(api.body) = "organization_id", (api.vd) = "@:len($)==0 || len($)==36; msg:'组织ID格式不正确'"];
}

message GetUserRequestDTO {
  optional string userID = 1 [(api.path) = "userID", (api.vd) = "@:len($)==36; msg:'用户ID格式不正确'", (api.none) = "true"];
}

