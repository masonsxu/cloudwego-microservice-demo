syntax = "proto3";

package http_base;

option go_package = "github.com/masonsxu/cloudwego-microservice-demo/gateway/biz/model/http_base";

import "base/api.proto";
import "base/enums.proto";

message JWTClaimsDTO {
  optional string userProfileID = 1 [(api.go_tag) = "json:\"user_profile_id,omitempty\" form:\"user_profile_id\" query:\"user_profile_id\""];
  optional core.UserStatus status = 3 [(api.go_tag) = "json:\"status,omitempty\" form:\"status\" query:\"status\""];
  repeated string roleIDs = 4 [(api.go_tag) = "json:\"role_ids,omitempty\" form:\"role_ids\" query:\"role_ids\""];
  optional string organizationID = 5 [(api.go_tag) = "json:\"organization_id,omitempty\" form:\"organization_id\" query:\"organization_id\""];
  repeated string departmentIDs = 6 [(api.go_tag) = "json:\"department_ids,omitempty\" form:\"department_ids\" query:\"department_ids\""];
  optional string permission = 7 [(api.go_tag) = "json:\"permission,omitempty\" form:\"permission\" query:\"permission\""];
  optional int64 exp = 8 [(api.go_tag) = "json:\"exp,omitempty\" form:\"exp\" query:\"exp\""];
  optional int64 iat = 9 [(api.go_tag) = "json:\"iat,omitempty\" form:\"iat\" query:\"iat\""];
  optional string dataScope = 10 [(api.go_tag) = "json:\"data_scope,omitempty\" form:\"data_scope\" query:\"data_scope\""];
  optional string username = 2 [(api.go_tag) = "json:\"username,omitempty\" form:\"username\" query:\"username\""];

  // OIDC standard claims
  optional string sub = 11 [(api.go_tag) = "json:\"sub,omitempty\" form:\"sub\" query:\"sub\""];
  optional string iss = 12 [(api.go_tag) = "json:\"iss,omitempty\" form:\"iss\" query:\"iss\""];
  optional string aud = 13 [(api.go_tag) = "json:\"aud,omitempty\" form:\"aud\" query:\"aud\""];
  optional string azp = 14 [(api.go_tag) = "json:\"azp,omitempty\" form:\"azp\" query:\"azp\""];
  optional string nonce = 15 [(api.go_tag) = "json:\"nonce,omitempty\" form:\"nonce\" query:\"nonce\""];
  optional int64 authTime = 16 [(api.go_tag) = "json:\"auth_time,omitempty\" form:\"auth_time\" query:\"auth_time\""];
}

message TokenInfoDTO {
  optional string accessToken = 1 [(api.go_tag) = "json:\"access_token,omitempty\" form:\"access_token\" query:\"access_token\""];
  optional int64 expiresIn = 2 [(api.go_tag) = "json:\"expires_in,omitempty\" form:\"expires_in\" query:\"expires_in\""];
  optional string tokenType = 3 [(api.go_tag) = "json:\"token_type,omitempty\" form:\"token_type\" query:\"token_type\""];

  // OIDC ID Token (JWT)
  optional string idToken = 4 [(api.go_tag) = "json:\"id_token,omitempty\" form:\"id_token\" query:\"id_token\""];
}

message BaseResponseDTO {
  optional int32 code = 1 [(api.go_tag) = "json:\"code\""];
  optional string message = 2 [(api.go_tag) = "json:\"message\""];
}

message OperationStatusResponseDTO {
  optional BaseResponseDTO baseResp = 1 [(api.go_tag) = "json:\"base_resp\""];
}

message PageRequestDTO {
  optional int32 page = 1 [(api.query) = "page", (api.vd) = "!isset(FetchAll) || *(FetchAll)$ || $>0", (api.go_tag) = "json:\"page,omitempty\" form:\"page\" query:\"page\""];
  optional int32 limit = 2 [(api.query) = "limit", (api.vd) = "!isset(FetchAll) || *(FetchAll)$ || ($>0 && $<=200)", (api.go_tag) = "json:\"limit,omitempty\" form:\"limit\" query:\"limit\""];
  optional string search = 3 [(api.query) = "search", (api.go_tag) = "json:\"search,omitempty\" form:\"search\" query:\"search\""];
  map<string, string> filter = 4 [(api.query) = "filter", (api.go_tag) = "json:\"filter,omitempty\" form:\"filter\" query:\"filter\""];
  optional string sort = 5 [(api.query) = "sort", (api.go_tag) = "json:\"sort,omitempty\" form:\"sort\" query:\"sort\""];
  repeated string fields = 6 [(api.query) = "fields", (api.go_tag) = "json:\"fields,omitempty\" form:\"fields\" query:\"fields\""];
  optional bool includeTotal = 7 [(api.query) = "include_total", (api.go_tag) = "json:\"include_total,omitempty\" form:\"include_total\" query:\"include_total\""];
  optional bool fetchAll = 8 [(api.query) = "fetch_all", (api.go_tag) = "json:\"fetch_all,omitempty\" form:\"fetch_all\" query:\"fetch_all\""];
}

message PageResponseDTO {
  optional int32 total = 1 [(api.go_tag) = "json:\"total,omitempty\""];
  optional int32 page = 2 [(api.go_tag) = "json:\"page,omitempty\""];
  optional int32 limit = 3 [(api.go_tag) = "json:\"limit,omitempty\""];
  optional int32 totalPages = 4 [(api.go_tag) = "json:\"total_pages,omitempty\""];
  optional bool hasNext = 5 [(api.go_tag) = "json:\"has_next,omitempty\""];
  optional bool hasPrev = 6 [(api.go_tag) = "json:\"has_prev,omitempty\""];
}
