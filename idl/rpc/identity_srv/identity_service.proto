message CreateAuditLogRequest {
  optional string requestID = 1;
  optional string traceID = 2;
  optional string userID = 3;
  optional string username = 4;
  optional string organizationID = 5;
  optional AuditAction action = 6;
  optional string resource = 7;
  optional string resourceID = 8;
  optional int32 statusCode = 9;
  optional bool success = 10;
  optional string clientIP = 11;
  optional string userAgent = 12;
  optional string requestBody = 13;
  optional int32 durationMs = 14;
}

message CreateAuditLogResponse {}

message ListAuditLogsRequest {
  optional rpc_base.PageRequest page = 1;
  optional string userID = 2;
  optional AuditAction action = 3;
  optional string resource = 4;
  optional bool success = 5;
  optional int64 startTime = 6;
  optional int64 endTime = 7;
}

message AuditLogStats {
  optional int64 totalCount = 1;
  optional int64 successCount = 2;
  optional int32 avgDurationMs = 3;
}

message ListAuditLogsResponse {
  repeated AuditLog auditLogs = 1;
  optional rpc_base.PageResponse page = 2;
  optional AuditLogStats stats = 3;
}
