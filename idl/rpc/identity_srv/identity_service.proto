syntax = "proto3";

package identity_srv;

option go_package = "github.com/masonsxu/cloudwego-microservice-demo/rpc/identity-srv/kitex_gen/identity_srv";

import "base/core.proto";
import "base/enums.proto";
import "rpc/base/base.proto";
import "rpc/identity_srv/identity_model.proto";

service IdentityService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);
  rpc ForcePasswordChange(ForcePasswordChangeRequest) returns (ForcePasswordChangeResponse);

  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse);
  rpc ChangeUserStatus(ChangeUserStatusRequest) returns (ChangeUserStatusResponse);
  rpc UnlockUser(UnlockUserRequest) returns (UnlockUserResponse);

  rpc CreateOrganization(CreateOrganizationRequest) returns (CreateOrganizationResponse);
  rpc GetOrganization(GetOrganizationRequest) returns (GetOrganizationResponse);
  rpc UpdateOrganization(UpdateOrganizationRequest) returns (UpdateOrganizationResponse);
  rpc DeleteOrganization(DeleteOrganizationRequest) returns (DeleteOrganizationResponse);
  rpc ListOrganizations(ListOrganizationsRequest) returns (ListOrganizationsResponse);
  rpc AddMembership(AddMembershipRequest) returns (AddMembershipResponse);
  rpc UpdateMembership(UpdateMembershipRequest) returns (UpdateMembershipResponse);
  rpc RemoveMembership(RemoveMembershipRequest) returns (RemoveMembershipResponse);
  rpc GetMembership(GetMembershipRequest) returns (GetMembershipResponse);
  rpc GetUserMemberships(GetUserMembershipsRequest) returns (GetUserMembershipsResponse);
  rpc GetPrimaryMembership(GetPrimaryMembershipRequest) returns (GetPrimaryMembershipResponse);
  rpc CheckMembership(CheckMembershipRequest) returns (CheckMembershipResponse);

  rpc CreateDepartment(CreateDepartmentRequest) returns (CreateDepartmentResponse);
  rpc GetDepartment(GetDepartmentRequest) returns (GetDepartmentResponse);
  rpc UpdateDepartment(UpdateDepartmentRequest) returns (UpdateDepartmentResponse);
  rpc DeleteDepartment(DeleteDepartmentRequest) returns (DeleteDepartmentResponse);
  rpc GetOrganizationDepartments(GetOrganizationDepartmentsRequest) returns (GetOrganizationDepartmentsResponse);

  rpc UploadTemporaryLogo(UploadTemporaryLogoRequest) returns (UploadTemporaryLogoResponse);
  rpc GetOrganizationLogo(GetOrganizationLogoRequest) returns (GetOrganizationLogoResponse);
  rpc DeleteOrganizationLogo(DeleteOrganizationLogoRequest) returns (DeleteOrganizationLogoResponse);
  rpc BindLogoToOrganization(BindLogoToOrganizationRequest) returns (BindLogoToOrganizationResponse);

  rpc CreateRoleDefinition(RoleDefinitionCreateRequest) returns (CreateRoleDefinitionResponse);
  rpc UpdateRoleDefinition(RoleDefinitionUpdateRequest) returns (UpdateRoleDefinitionResponse);
  rpc DeleteRoleDefinition(DeleteRoleDefinitionRequest) returns (DeleteRoleDefinitionResponse);
  rpc GetRoleDefinition(GetRoleDefinitionRequest) returns (GetRoleDefinitionResponse);
  rpc ListRoleDefinitions(RoleDefinitionQueryRequest) returns (RoleDefinitionListResponse);
  rpc AssignRoleToUser(AssignRoleToUserRequest) returns (UserRoleAssignmentResponse);
  rpc UpdateUserRoleAssignment(UpdateUserRoleAssignmentRequest) returns (UpdateUserRoleAssignmentResponse);
  rpc RevokeRoleFromUser(RevokeRoleFromUserRequest) returns (RevokeRoleFromUserResponse);
  rpc GetLastUserRoleAssignment(GetLastUserRoleAssignmentRequest) returns (GetLastUserRoleAssignmentResponse);
  rpc ListUserRoleAssignments(UserRoleQueryRequest) returns (UserRoleListResponse);
  rpc GetUsersByRole(GetUsersByRoleRequest) returns (GetUsersByRoleResponse);
  rpc BatchBindUsersToRole(BatchBindUsersToRoleRequest) returns (BatchBindUsersToRoleResponse);
  rpc BatchGetUserRoles(BatchGetUserRolesRequest) returns (BatchGetUserRolesResponse);

  rpc UploadMenu(UploadMenuRequest) returns (UploadMenuResponse);
  rpc GetMenuTree(GetMenuTreeRequest) returns (GetMenuTreeResponse);

  rpc ConfigureRoleMenus(ConfigureRoleMenusRequest) returns (ConfigureRoleMenusResponse);
  rpc GetRoleMenuTree(GetRoleMenuTreeRequest) returns (GetRoleMenuTreeResponse);
  rpc GetUserMenuTree(GetUserMenuTreeRequest) returns (GetUserMenuTreeResponse);
  rpc GetRoleMenuPermissions(GetRoleMenuPermissionsRequest) returns (GetRoleMenuPermissionsResponse);
  rpc HasMenuPermission(HasMenuPermissionRequest) returns (HasMenuPermissionResponse);
  rpc GetUserMenuPermissions(GetUserMenuPermissionsRequest) returns (GetUserMenuPermissionsResponse);

  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);
  rpc SyncPolicies(SyncPoliciesRequest) returns (SyncPoliciesResponse);
  rpc GetUserDataScope(GetUserDataScopeRequest) returns (GetUserDataScopeResponse);

  rpc CreateAuditLog(CreateAuditLogRequest) returns (CreateAuditLogResponse);
  rpc ListAuditLogs(ListAuditLogsRequest) returns (ListAuditLogsResponse);
}

message LoginRequest {
  optional string username = 1;
  optional string password = 2;
}

message LoginResponse {
  optional UserProfile userProfile = 1;
  repeated UserMembership memberships = 2;
  repeated MenuNode menuTree = 3;
  repeated string roleIDs = 4;
  repeated MenuPermission permissions = 5;
  repeated RoleDefinition roleDetails = 6;
}

message ChangePasswordRequest {
  optional string userID = 1;
  optional string oldPassword = 2;
  optional string newPassword = 3;
}

message ChangePasswordResponse {}

message ResetPasswordResponse {}

message ForcePasswordChangeResponse {}

message CreateUserResponse {
  optional UserProfile userProfile = 1;
}

message GetUserResponse {
  optional UserProfile userProfile = 1;
}

message UpdateUserResponse {
  optional UserProfile userProfile = 1;
}

message ResetPasswordRequest {
  optional string userID = 1;
  optional string newPassword = 2;
}

message ForcePasswordChangeRequest {
  optional string userID = 1;
}

message CreateUserRequest {
  optional string username = 1;
  optional string password = 2;
  optional string email = 3;
  optional string phone = 4;
  optional string firstName = 5;
  optional string lastName = 6;
  optional string realName = 7;
  optional core.Gender gender = 8;
  optional string professionalTitle = 9;
  optional string employeeID = 10;
  optional bool mustChangePassword = 11;
  optional int64 accountExpiry = 12;
}

message GetUserRequest {
  optional string userID = 1;
}

message UpdateUserRequest {
  optional string userID = 1;
  optional string email = 2;
  optional string phone = 3;
  optional string firstName = 4;
  optional string lastName = 5;
  optional string realName = 6;
  optional core.Gender gender = 7;
  optional string professionalTitle = 8;
  optional string employeeID = 9;
  optional int64 accountExpiry = 10;
}

message DeleteUserRequest {
  optional string userID = 1;
}

message DeleteUserResponse {}

message ChangeUserStatusResponse {}

message UnlockUserResponse {}

message ListUsersRequest {
  optional rpc_base.PageRequest page = 1;
  optional string organizationID = 2;
  optional core.UserStatus status = 3;
}

message ListUsersResponse {
  repeated UserProfile users = 1;
  optional rpc_base.PageResponse page = 2;
}

message SearchUsersRequest {
  optional rpc_base.PageRequest page = 1;
  optional string organizationID = 2;
}

message SearchUsersResponse {
  repeated UserProfile users = 1;
  optional rpc_base.PageResponse page = 2;
}

message ChangeUserStatusRequest {
  optional string userID = 1;
  optional core.UserStatus newStatus = 2;
}

message UnlockUserRequest {
  optional string userID = 1;
}

message CreateOrganizationRequest {
